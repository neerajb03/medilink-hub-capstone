{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-{{ $name }}
  namespace: {{ $.Values.global.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ $svc.irsaRoleArn | quote }}
  labels:
    app: {{ $name }}
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: medilink-hub
{{- end }}
{{- end }}
