{{- $svc := index .Values.services "rag-service" }}
{{- if $svc.enabled }}
# rag-service is API-only — vector search + Bedrock Nova Lite inference + Guardrails.
# SQS ingestion lives entirely in rag-worker (separate Deployment, KEDA-scaled).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: rag-service
    app.kubernetes.io/part-of: medilink-hub
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      serviceAccountName: sa-rag-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: rag-service
        image: {{ .Values.global.imageRegistry }}/rag-service:{{ .Values.global.imageTag }}
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8005
        env:
        - name: AWS_DEFAULT_REGION
          value: {{ .Values.global.awsRegion | quote }}
        - name: JWT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: medilink-jwt-keys
              key: public.pem
        - name: BEDROCK_LLM_MODEL_ID
          value: "amazon.nova-lite-v1:0"
        - name: BEDROCK_EMBED_MODEL_ID
          value: "amazon.titan-embed-text-v2:0"
        - name: BEDROCK_GUARDRAIL_ID
          value: ""
        - name: BEDROCK_GUARDRAIL_VERSION
          value: "DRAFT"
        livenessProbe:
          httpGet: { path: /health, port: http }
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet: { path: /health, port: http }
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: {{ $svc.resources.requests.cpu | quote }}
            memory: {{ $svc.resources.requests.memory | quote }}
          limits:
            cpu: {{ $svc.resources.limits.cpu | quote }}
            memory: {{ $svc.resources.limits.memory | quote }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: rag-service
{{- end }}
