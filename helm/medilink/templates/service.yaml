{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: medilink-hub
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
  - name: http
    port: {{ $svc.port }}
    targetPort: http
    protocol: TCP
{{- end }}
{{- end }}
