# This Secret holds the RSA keypair for JWT signing/verification.
# It is populated from AWS Secrets Manager BEFORE helm install via:
#
#   kubectl create secret generic medilink-jwt-keys \
#     --namespace medilink \
#     --from-literal=private.pem="$(aws secretsmanager get-secret-value \
#         --secret-id medilink/production/jwt-rsa-private-key \
#         --query SecretString --output text)" \
#     --from-literal=public.pem="$(aws secretsmanager get-secret-value \
#         --secret-id medilink/production/jwt-rsa-public-key \
#         --query SecretString --output text)"
#
# This file is intentionally empty — the Secret is created out-of-band.
# Helm will not overwrite it on upgrade because it does not own this resource.
