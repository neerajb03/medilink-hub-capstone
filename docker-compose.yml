version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build: ./user-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/user_db
      JWT_SECRET: supersecret
    depends_on:
      postgres:
        condition: service_healthy

  appointment-service:
    build: ./appointment-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/appointment_db
      JWT_SECRET: supersecret
    depends_on:
      postgres:
        condition: service_healthy

  health-service:
    build: ./health-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/health_db
      JWT_SECRET: supersecret
    depends_on:
      postgres:
        condition: service_healthy

  document-service:
    build: ./document-service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/document_db
      JWT_SECRET: supersecret
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET_NAME: medilink-docs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_USER_URL: http://localhost:8001
      VITE_APPOINTMENT_URL: http://localhost:8002
      VITE_HEALTH_URL: http://localhost:8003
      VITE_DOCUMENT_URL: http://localhost:8004
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - user-service
      - appointment-service
      - health-service
      - document-service

volumes:
  postgres_data:
  minio_data:
